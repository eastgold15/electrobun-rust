<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Host Message Test</title>
    <style>
    body {
      padding: 10px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      color: white;
      cursor: pointer;
      background: #00838f;
      border: none;
      border-radius: 4px;
    }
    button:hover {

    <h3 style="margin-top: 0;">Host Message Test</h3>
    <button id="sendBtn">Send Message to Host</button>

    </p>
  </body>
