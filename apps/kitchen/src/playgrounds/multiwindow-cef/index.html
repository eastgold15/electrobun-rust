<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Multi-Window CEF Test</title>
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eee;
      background: #1a1a2e;
    }
    .header {
      padding: 15px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .header h2 {
      font-size: 16px;
      font-weight: 500;
    }
    .header .window-id {
      font-weight: 600;
      color: #e94560;
    }
    .status {
      padding: 10px 20px;
      font-size: 13px;
      background: #0f3460;
    }
    .status-item {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 4px 0;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      background: #666;
      border-radius: 50%;
    }
    .status-dot.success {
      background: #4ade80;
    }
    .status-dot.pending {
      background: #fbbf24;
    }
    .status-dot.error {
      background: #ef4444;
    }
    .content {
      display: flex;
      flex: 1;
      flex-direction: column;
      padding: 20px;
    }
    .oopif-container {
      flex: 1;
      min-height: 200px;
      overflow: hidden;
      border: 2px dashed #0f3460;
      border-radius: 8px;
    }
    electrobun-webview {
      display: block;
      width: 100%;
      height: 100%;
    }
    .instructions {
      padding: 12px;
      margin-top: 15px;
      font-size: 13px;
      line-height: 1.5;
      background: #16213e;
      border-radius: 6px;
    }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>Window <span class="window-id" id="windowId">?</span></h2>
    </div>
    <div class="status">
      <div class="status-item">
        <span class="status-dot" id="windowStatus"></span>
        <span>Window created</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="oopifStatus"></span>
        <span>OOPIF webview loaded</span>
      </div>
    </div>
    <div class="content">
      <div class="oopif-container">
        <electrobun-webview
          id="testWebview"
          src="https://blackboard.sh"
          renderer="cef"
        ></electrobun-webview>
      </div>
      <div class="instructions">
        This window contains an OOPIF (out-of-process iframe) via
        &lt;webview&gt; tag.<br>
        Verify the webview content loads without needing to move the mouse.
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
