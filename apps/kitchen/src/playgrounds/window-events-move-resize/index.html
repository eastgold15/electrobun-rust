<!DOCTYPE html>
<html>
  <head>
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      color: #eee;
      background: #1a1a2e;
    }
    h2 {
      margin-bottom: 20px;
      color: #fff;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    .info-box {
      padding: 15px;
      background: #16213e;
      border-radius: 8px;
    }
    .info-box h3 {
      margin-bottom: 8px;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
    }
    .info-box .value {
      font-family: monospace;
      font-size: 24px;
      font-weight: bold;
    }
    .status-section {
      margin-top: auto;
    }
    .status-item {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .indicator {
      width: 12px;
      height: 12px;
      background: #444;
      border-radius: 50%;
    }
    .indicator.detected {
      background: #4ade80;
    }
    .status-text {
      color: #888;
    }
    .status-text.detected {
      color: #4ade80;
    }
    .done-message {
      display: none;
      padding: 15px;
      margin-top: 15px;
      text-align: center;
      background: #166534;
      border-radius: 8px;
    }
    .done-message.show {
      display: block;
    }
    button {
      padding: 10px 20px;
      margin-top: 15px;
      font-size: 14px;
      color: white;
      cursor: pointer;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
    }
    button:hover {
      background: #2563eb;
    }
    </style>
  </head>
  <body>
    <h2>Window Move & Resize Events Detection</h2>

    <div class="info-grid">
      <div class="info-box">
        <h3>Position</h3>
        <div class="value" id="position">---, ---</div>
      </div>
      <div class="info-box">
        <h3>Size</h3>
        <div class="value" id="size">--- x ---</div>
      </div>
    </div>

    <div class="status-section">
      <div class="status-item">
        <div class="indicator" id="move-indicator"></div>
        <span class="status-text" id="move-status"
          >Move: Drag the window...</span
        >
      </div>
      <div class="status-item">
        <div class="indicator" id="resize-indicator"></div>
        <span class="status-text" id="resize-status"
          >Resize: Drag window edges...</span
        >
      </div>
    </div>

    <div class="done-message" id="done-message">
      Both events detected! Close the window when done.
    </div>

    <button id="closeBtn">Close Window</button>
    <script src="index.js"></script>
  </body>
</html>
